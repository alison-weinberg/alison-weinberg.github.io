<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbox — Office of the Watch</title>

  <style>
    @font-face {
      font-family: 'Blackletter ITC';
      src: url('ITCBLKAD.TTF') format('truetype');
      font-weight: normal;
      font-style: normal;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --parchment-light: #fdf6e3;
      --parchment-dark:  #d9c07a;
      --parchment-aged:  #c9a84c;
      --ink:             #2c1810;
      --ink-mid:         #5a3a20;
      --ink-light:       #8b6914;
      --seal-red:        #7a1515;
      --seal-text:       #fdf6e3;
    }

    html, body {
      height: 100%;
      background: transparent;
      font-family: 'IM Fell English', Georgia, serif;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.5;
    }

    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .test-banner {
      flex-shrink: 0;
      background: rgba(255, 224, 178, 0.92);
      color: #7a3000;
      font-family: monospace;
      font-size: 11px;
      padding: 3px 10px;
      text-align: center;
    }

    .inbox-header {
      flex-shrink: 0;
      padding: 10px 16px 8px;
      border-bottom: 2px solid var(--parchment-aged);
      background: transparent;
      text-align: center;
    }

    .inbox-title {
      font-family: 'Blackletter ITC', Georgia, serif;
      font-size: 20px;
      color: var(--ink);
      letter-spacing: 0.5px;
    }

    .inbox-recipient {
      font-size: 11px;
      font-style: italic;
      color: var(--ink-mid);
      margin-top: 2px;
    }

    .message-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
      background: transparent;
      scrollbar-width: thin;
      scrollbar-color: var(--parchment-aged) transparent;
    }

    .message-list::-webkit-scrollbar { width: 7px; }
    .message-list::-webkit-scrollbar-track { background: transparent; }
    .message-list::-webkit-scrollbar-thumb {
      background: var(--parchment-aged);
      border-radius: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      font-style: italic;
      color: var(--ink-mid);
      font-size: 12px;
    }

    .message-item {
      border-radius: 5px;
      margin-bottom: 6px;
      border: 1.5px solid var(--parchment-aged);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .message-item:last-child { margin-bottom: 0; }
    .message-item:hover { border-color: var(--ink-light); }

    .message-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 9px 11px;
      background: var(--parchment-light);
      user-select: none;
    }

    .message-item.read .message-row {
      background: var(--parchment-dark);
    }

    .message-fields { flex: 1; min-width: 0; }

    .field-line {
      display: flex;
      gap: 6px;
      font-size: 11px;
      line-height: 1.65;
      overflow: hidden;
      white-space: nowrap;
    }

    .field-label {
      color: var(--ink-mid);
      font-style: italic;
      flex-shrink: 0;
      min-width: 34px;
    }

    .field-value {
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .message-item.unread .field-value { font-weight: bold; }

    .new-badge {
      flex-shrink: 0;
      align-self: center;
      background: var(--seal-red);
      color: var(--seal-text);
      font-family: 'IM Fell English', serif;
      font-size: 9px;
      letter-spacing: 0.5px;
      padding: 2px 6px;
      border-radius: 10px;
    }

    .message-body {
      display: none;
      padding: 14px 16px 16px;
      background: var(--parchment-light);
      border-top: 1px solid var(--parchment-aged);
      font-size: 12px;
      line-height: 1.8;
    }

    .message-item.expanded .message-body { display: block; }

    .letter-masthead {
      text-align: center;
      margin-bottom: 10px;
    }

    .letter-office {
      display: block;
      font-family: 'Blackletter ITC', Georgia, serif;
      font-size: 15px;
      color: var(--ink);
    }

    .letter-dateline {
      font-style: italic;
      font-size: 11px;
      color: var(--ink-mid);
    }

    .letter-rule {
      border: none;
      border-top: 1px solid var(--parchment-aged);
      margin: 9px 0;
    }

    .letter-meta { margin-bottom: 8px; }

    .letter-meta .field-line {
      font-size: 12px;
      white-space: normal;
    }

    .letter-text {
      font-size: 12px;
      line-height: 1.8;
      white-space: pre-wrap;
      color: var(--ink);
    }

    .view-report-btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 7px 0;
      background: transparent;
      border: 1.5px solid var(--seal-red);
      border-radius: 4px;
      color: var(--seal-red);
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, color 0.15s;
    }

    .view-report-btn:hover {
      background: var(--seal-red);
      color: var(--seal-text);
    }

    .letter-signoff {
      margin-top: 12px;
      font-style: italic;
      font-size: 11px;
      color: var(--ink-mid);
      text-align: right;
    }

    /* ── Report overlay ── */
    #reportOverlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(20, 10, 5, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 9999;
    }

    #reportOverlay img {
      max-width: 100%;
      max-height: calc(100% - 52px);
      object-fit: contain;
      border: 1px solid var(--parchment-aged);
    }

    #reportOverlay .dismiss-report {
      flex-shrink: 0;
      background: transparent;
      border: 1.5px solid var(--parchment-aged);
      border-radius: 4px;
      color: var(--parchment-light);
      font-family: 'IM Fell English', Georgia, serif;
      font-size: 12px;
      padding: 5px 20px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #reportOverlay .dismiss-report:hover {
      background: rgba(253, 246, 227, 0.15);
    }
  </style>
</head>

    abridged:
`Detective,

Your work on this case has been noted. The time has come to present your findings.

Report to the Prince\u2019s chambers when you are ready. Verona is waiting.

By order of Prince Escalus`
  }
];

// ─── REPORT OVERLAY ───────────────────────────────────────────────────────────

function openReport(filename) {
  if (document.getElementById('reportOverlay')) return;

  const overlay = document.createElement('div');
  overlay.id = 'reportOverlay';

  const img = document.createElement('img');
  img.src = filename;
  img.alt = 'Coroner\u2019s Report';

  const btn = document.createElement('button');
  btn.className = 'dismiss-report';
  btn.textContent = 'Dismiss Report';
  btn.addEventListener('click', closeReport);

  overlay.appendChild(img);
  overlay.appendChild(btn);
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeReport();
  });

  document.body.appendChild(overlay);
}

function closeReport() {
  const overlay = document.getElementById('reportOverlay');
  if (overlay) overlay.remove();
}

// ─── LOCALSTORAGE BRIDGE ──────────────────────────────────────────────────────
// Storyline writes variable values here via Execute JavaScript on precinct
// slide timeline start. Falls back to GetPlayer() where available.


function getSLVar(name, fallback) {
  try {
    const val = localStorage.getItem('sl_' + name);
    if (val !== null) {
      if (val === 'true')  return true;
      if (val === 'false') return false;
      return val;
    }
  } catch (e) {}
  try {
    const player = window.parent.GetPlayer ? window.parent.GetPlayer() : GetPlayer();
    return player ? player.GetVar(name) : fallback;
  } catch (e) { return fallback; }
}

// ─── PERSISTENT READ STATE ────────────────────────────────────────────────────

const LS_READ_KEY = 'rj_csi_readState';
const readState   = {};

function loadReadState() {
  try {
    const saved = localStorage.getItem(LS_READ_KEY);
    if (saved) Object.assign(readState, JSON.parse(saved));
  } catch (e) {}
}

function saveReadState() {
  try {
    localStorage.setItem(LS_READ_KEY, JSON.stringify(readState));
  } catch (e) {}
}

// ─── SESSION STATE ────────────────────────────────────────────────────────────

let expandedVar  = null;
let prevSnapshot = null;
const TEST_MODE  = location.search.includes('test');

function makeSnapshot() {
  const flags = MESSAGES.map(m => getSLVar(m.varName, false) ? '1' : '0').join('');
  const mode  = getSLVar('ModernText', true) ? 'A' : 'B';
  const name  = getSLVar('Detective_Name', '');
  return flags + mode + name;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

function render(force) {
  const snap = makeSnapshot();
  if (!force && snap === prevSnapshot) return;
  prevSnapshot = snap;

  const name        = getSLVar('Detective_Name', '') || '';
  const modernText  = TEST_MODE ? true : getSLVar('ModernText', true);
  const displayName = name || 'Detective';

  document.getElementById('recipient').textContent =
    name ? 'Detective ' + name : 'Detective';

  const received = MESSAGES
    .filter(m => TEST_MODE || getSLVar(m.varName, false) === true)
    .sort((a, b) => b.timestamp - a.timestamp);

  const list  = document.getElementById('messageList');
  const empty = document.getElementById('emptyState');

  list.querySelectorAll('.message-item').forEach(el => el.remove());

  if (received.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  received.forEach(msg => {
    const isRead     = readState[msg.varName] || false;
    const bodyText   = modernText ? msg.abridged : msg.authentic;
    const isExpanded = expandedVar === msg.varName;

    // Determine attachments based on current mode
    const attachments = (msg.attachments || []).map(a => ({
      file:  modernText ? a.file_abridged : a.file_authentic,
      label: a.label
    })).filter(a => a.file);

    const attachCount = attachments.length;
    const attachBadge = attachCount > 0
      ? '<span style="font-size:10px;font-style:italic;color:var(--ink-mid);margin-left:4px;">(' + attachCount + ' attachment' + (attachCount > 1 ? 's' : '') + ')</span>'
      : '';

    const item = document.createElement('div');
    item.className =
      'message-item' +
      (isRead     ? ' read'     : ' unread') +
      (isExpanded ? ' expanded' : '');

    item.innerHTML =
      '<div class="message-row">' +
        '<div class="message-fields">' +
          row('To',   'Detective ' + esc(displayName)) +
          row('From', esc(msg.from))                   +
          '<div class="field-line">' +
            '<span class="field-label">Re:</span>' +
            '<span class="field-value">' + esc(msg.re) + attachBadge + '</span>' +
          '</div>' +
        '</div>' +
        (!isRead ? '<span class="new-badge" aria-label="Unread">NEW</span>' : '') +
      '</div>' +
      '<div class="message-body" role="region" aria-label="Full report">' +
        '<div class="letter-masthead">' +
          '<span class="letter-office">&#x2756; Office of the Watch &#x2756;</span>' +
          '<span class="letter-dateline">Verona, this day past</span>' +
        '</div>' +
        '<hr class="letter-rule">' +
        '<div class="letter-meta">' +
          row('To',   'Detective ' + esc(displayName), true) +
          row('From', esc(msg.from),                   true) +
          row('Re',   esc(msg.re),                     true) +
        '</div>' +
        '<hr class="letter-rule">' +
        '<div class="letter-text">' + esc(bodyText) + '</div>' +
        (attachments.map(a =>
          '<button class="view-report-btn" data-file="' + esc(a.file) + '">' + esc(a.label) + '</button>'
        ).join('')) +
        '<div class="letter-signoff">\u2014 Filed to Detective ' + esc(displayName) + '</div>' +
      '</div>';

    // Expand/collapse on row click — open report on button click
    item.addEventListener('click', function(e) {
      const btn = e.target.closest('.view-report-btn');
      if (btn) {
        e.stopPropagation();
        openReport(btn.dataset.file);
        return;
      }
      toggle(msg.varName);
    });

    list.appendChild(item);
  });
}

function toggle(varName) {
  expandedVar = (expandedVar === varName) ? null : varName;
  if (expandedVar) {
    readState[varName] = true;
    saveReadState();
  }
  render(true);
}

function row(label, value, wrap) {
  const ws = wrap ? 'white-space:normal;' : '';
  return '<div class="field-line" style="' + ws + '">' +
    '<span class="field-label">' + label + ':</span>' +
    '<span class="field-value">' + value + '</span>' +
  '</div>';
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────

if (TEST_MODE) {
  document.getElementById('testBanner').style.display = 'block';
}

loadReadState();
render(true);
setInterval(() => render(false), 1500);
window.addEventListener('focus', () => render(true));

</script>
</body>
